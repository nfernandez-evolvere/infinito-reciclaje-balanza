; Ajustes de PHP para producción — Balanza
; (se carga como conf.d/zz-app.ini, pisa los defaults)

memory_limit = 512M
max_execution_time = 120
post_max_size = 25M
upload_max_filesize = 25M

expose_php = Off
date.timezone = America/Argentina/Cordoba

; Errores: a stderr (los recoge supervisor → stdout del contenedor), nunca al cliente
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr

; Sesiones las maneja Laravel (driver database), no el SAPI
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; --- TLS / bundle de CA para conexiones HTTPS salientes ----------------------
; Necesario para que cURL/OpenSSL verifiquen el certificado de APIs externas
; (ej: análisis con IA → generativelanguage.googleapis.com). El bundle lo provee
; el paquete ca-certificates instalado en el Dockerfile. Lo fijamos explícito
; para no depender del default implícito del build de libcurl y que el mismo
; comportamiento valga en dev y prod (misma imagen).
curl.cainfo = /etc/ssl/certs/ca-certificates.crt
openssl.cafile = /etc/ssl/certs/ca-certificates.crt
