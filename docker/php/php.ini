; Ajustes de PHP para producción — Balanza
; (se carga como conf.d/zz-app.ini, pisa los defaults)

memory_limit = 512M
max_execution_time = 120
post_max_size = 25M
upload_max_filesize = 25M

expose_php = Off
date.timezone = America/Argentina/Cordoba

; Errores: a stderr (los recoge supervisor → stdout del contenedor), nunca al cliente
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr

; Sesiones las maneja Laravel (driver database), no el SAPI
realpath_cache_size = 4096K
realpath_cache_ttl = 600
