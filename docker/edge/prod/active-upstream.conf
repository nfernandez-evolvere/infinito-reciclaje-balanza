# Upstream ACTIVO de PRODUCCIÓN — lo gestiona deploy.sh, no editar a mano.
# Placeholder de arranque: prod aún NO desplegado. nginx resuelve los upstreams
# al arrancar, así que sin un host resoluble el edge no levanta ("host not found
# in upstream"). 127.0.0.1:9 resuelve siempre; las requests a prod dan 502 hasta
# el primer deploy, que reemplaza esta línea por el upstream real (blue/green).
upstream balanza_prod_app {
    server 127.0.0.1:9;
}
