# nginx EDGE / router del blue-green (corre en el contenedor balanza-edge).
# El upstream activo lo define active-upstream.conf, que deploy.sh reescribe
# en el cutover. Tras reescribirlo: `docker exec balanza-edge nginx -s reload`.

# Define el upstream "balanza_app" → apunta a balanza-app-blue o -green.
include /etc/nginx/edge/active-upstream.conf;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 25m;

    # Buffers/timeout razonables para PDFs y reportes
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    location / {
        proxy_pass http://balanza_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # En el cutover, reintentar contra el siguiente upstream si el viejo cae
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    # Health del edge mismo (no toca la app)
    location = /edge-health {
        access_log off;
        return 200 "edge ok\n";
        add_header Content-Type text/plain;
    }
}

