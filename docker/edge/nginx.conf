# nginx EDGE — router del blue-green para PRODUCCIÓN y STAGING.
# Los upstreams activos los reescribe deploy.sh en cada cutover.
# Tras cada reescritura: `docker exec balanza-edge nginx -s reload`.
#
# Dominios (cambiar a los reales en el servidor):
#   Producción : APP_DOMAIN  →  ej. balanza.tudominio.com
#   Staging    : STAGE_DOMAIN → ej. staging.balanza.tudominio.com

include /etc/nginx/edge/prod/active-upstream.conf;
include /etc/nginx/edge/staging/active-upstream.conf;

# ---------------------------------------------------------------------------
# Bloque compartido: timeouts y headers de seguridad reutilizados en ambos
# server blocks via map/include no está disponible en este contexto, así que
# los repetimos explícitamente para evitar dependencias de include extras.
# ---------------------------------------------------------------------------

# ── PRODUCCIÓN ──────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    # TODO: cambiar al dominio real de producción (ej: balanza.tudominio.com)
    server_name balanza.tudominio.com;

    server_tokens off;
    client_max_body_size 25m;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    add_header X-Frame-Options           "SAMEORIGIN"                         always;
    add_header X-Content-Type-Options    "nosniff"                            always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    location / {
        proxy_pass         http://balanza_prod_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    location = /edge-health {
        access_log off;
        return 200 "edge:prod ok\n";
        add_header Content-Type text/plain;
    }
}

# ── STAGING ─────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    # TODO: cambiar al dominio real de staging (ej: staging.balanza.tudominio.com)
    server_name staging.balanza.tudominio.com;

    server_tokens off;
    client_max_body_size 25m;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    add_header X-Frame-Options           "SAMEORIGIN"                         always;
    add_header X-Content-Type-Options    "nosniff"                            always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
    # Previene que motores de búsqueda indexen staging
    add_header X-Robots-Tag              "noindex, nofollow"                  always;

    location / {
        proxy_pass         http://balanza_staging_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    location = /edge-health {
        access_log off;
        return 200 "edge:staging ok\n";
        add_header Content-Type text/plain;
    }
}

