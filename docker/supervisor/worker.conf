; Grupo WORKER — cola + scheduler. UNA sola instancia en todo el host
; (NO participa del blue-green) para evitar doble-scheduling de los reportes
; programados y la detección de alertas (ver routes/console.php).

[supervisord]
nodaemon = true
user = root
logfile = /dev/null
logfile_maxbytes = 0
pidfile = /run/supervisord.pid

[program:queue]
command = php /app/artisan queue:work --sleep=3 --tries=3 --max-time=3600 --max-jobs=1000
user = www-data
autostart = true
autorestart = true
stopwaitsecs = 3600
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0
priority = 10

[program:scheduler]
command = php /app/artisan schedule:work
user = www-data
autostart = true
autorestart = true
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0
priority = 20
