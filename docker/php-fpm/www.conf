; Pool php-fpm de la app — escucha en TCP para que nginx (mismo contenedor)
; lo alcance. Corre como www-data.

[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000

; Gestión dinámica de procesos. Ajustar según RAM del host de producción.
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

; Logs del worker al stderr del contenedor
catch_workers_output = yes
decorate_workers_output = no
clear_env = no

; Endpoint de status (opcional, útil para métricas internas)
pm.status_path = /fpm-status
ping.path = /fpm-ping
