# nginx de la APP (va dentro de la imagen) — sirve /public y pasa a php-fpm.
# OJO: este NO es el nginx que hace blue-green. Ese vive en docker/edge/.

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /app/public;
    index index.php;

    server_tokens off;

    charset utf-8;
    client_max_body_size 25m;

    # Compresión
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        application/javascript application/json application/xml
        text/css text/plain text/xml image/svg+xml font/woff2;

    # Health check de Laravel (lo usa el HEALTHCHECK del contenedor y el edge)
    location = /up {
        try_files $uri /index.php?$query_string;
        access_log off;
    }

    # Assets versionados por Vite — cache agresivo e inmutable
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        # Pasar el Host header explícitamente: el fastcgi_params estándar de Debian
        # no lo incluye, y sin él PHP no recibe HTTP_HOST → Symfony usa SERVER_NAME
        # (_) y SERVER_PORT (8080) → route() genera URLs incorrectas.
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120s;
    }

    # No exponer dotfiles ni .php ocultos
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
