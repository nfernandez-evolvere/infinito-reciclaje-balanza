name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Pint + Larastan + Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gd, zip, sqlite3, pcov
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # Estilo: el gate usa el pint.json del repo (=> alineados, sin php_unit_method_casing).
      - name: Lint (Pint)
        run: vendor/bin/pint --test

      # Analisis estatico: corre phpstan/larastan con la config del repo.
      - name: Static analysis (Larastan)
        run: composer analyse

      # Tests + cobertura. --min arranca en 0 (no bloquea) y se sube fase a fase.
      # Gracias a withoutVite() en TestCase, no hace falta build de Vite.
      - name: Tests + coverage
        run: php artisan test --coverage --min=0
