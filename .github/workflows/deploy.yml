name: Deploy

# Despliegue automático sin caída al hacer merge a main:
#   1. tests   → corre el gate de CI completo (reusable)
#   2. build   → construye y pushea la imagen a GHCR
#   3. deploy  → SSH al host: git pull + docker/deploy.sh (swap blue-green)
on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false   # nunca cancelar un deploy a mitad del cutover

jobs:
  tests:
    uses: ./.github/workflows/ci.yml

  build:
    name: Build & push a GHCR
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy blue-green (SSH)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH → pull + swap
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.APP_DIR || '~/infinito-reciclaje-balanza' }}
            git fetch --all
            git reset --hard ${{ github.sha }}
            export GHCR_USER='${{ github.actor }}'
            export GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}'
            # NOTA: el deploy automático NO migra el schema (la base es compartida
            # entre proyectos → migraciones siempre deliberadas). Cuando un release
            # traiga migraciones, ejecutar el deploy a mano con RUN_MIGRATIONS=true.
            bash docker/deploy.sh ${{ github.sha }}
